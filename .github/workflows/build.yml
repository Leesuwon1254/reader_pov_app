name: Build & Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Get build metadata
        id: meta
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/reader_pov_${{ steps.meta.outputs.date }}_${{ steps.meta.outputs.sha }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha }}
          name: "Reader POV ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.sha }})"
          body: |
            자동 빌드: `${{ github.sha }}`
            커밋 메시지: ${{ github.event.head_commit.message }}
          files: |
            build/app/outputs/flutter-apk/reader_pov_${{ steps.meta.outputs.date }}_${{ steps.meta.outputs.sha }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
